<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Focus Dash Pro</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-container" class="todo-section">
        <div id="greeting" style="margin-bottom: 20px;">GİRİŞ YAP</div>
        <div class="input-group" style="flex-direction: column; gap: 15px; display: flex; align-items: center;">
            <input type="email" id="login-email" placeholder="E-posta" style="width: 100%;">
            <input type="password" id="login-password" placeholder="Şifre" style="width: 100%;">
            <div style="display: flex; gap: 10px; width: 100%;">
                <button onclick="handleLogin()" style="flex: 1;">Giriş</button>
                <button onclick="handleSignUp()" style="flex: 1; background: #916BBF !important;">Kayıt</button>
            </div>
        </div>
        <p id="auth-error" style="color: #ff4757; margin-top: 15px; font-size: 14px;"></p>
    </div>

    <div class="done-section" id="done-sec" style="display: none;">
        <h2>Yapılanlar</h2>
        <ul id="done-list"></ul>
    </div>

    <div class="todo-section" id="todo-sec" style="display: none;">
        <div id="current-day"></div>
        <div id="current-date"></div> 

        <div id="clock">00:00:00</div>
        <div id="greeting">TO DO</div>

        <form id="todo-form" onsubmit="event.preventDefault(); addTodo();">
            <div class="input-group" style="display: flex; justify-content: center;">
                <input type="text" id="todo-input" placeholder="Yeni görev ekle..." autocomplete="off">
                <button type="submit">Ekle</button>
            </div>
        </form>

        <ul id="todo-list"></ul>

        <button onclick="handleLogout()" style="margin-top: 30px; background: transparent; border: 1px solid #ff4757; color: #ff4757; padding: 5px 15px; border-radius: 5px; cursor: pointer; display: block; margin-left: auto; margin-right: auto; width: fit-content;">Çıkış Yap</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
