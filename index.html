<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Odaklanma Uygulaması</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="done-section">
        <h2>Yapılanlar</h2>
        <ul id="done-list"></ul>
    </div>

    <div class="todo-section">
        <div id="current-day"></div>
        <div id="current-date"></div> 

        <div id="clock">00:00:00</div>
        <div id="greeting">TO DO</div>

        <form id="todo-form" onsubmit="event.preventDefault(); addTodo();">
            <div class="input-group" style="display: flex; justify-content: center;">
                <input type="text" id="todo-input" placeholder="Yeni görev ekle..." autocomplete="off">
                <button type="submit">Ekle</button>
            </div>
        </form>

        <ul id="todo-list"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
